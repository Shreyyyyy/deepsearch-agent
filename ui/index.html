<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepResearch | AI Financial Intelligence | SENDA | By: Shreyans Jain</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0b;
            --panel-dark: #161618;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border: #27272a;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 10, 11, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo {
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo span {
            color: var(--accent);
        }

        .badge {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            padding: 0.2rem 0.6rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid var(--accent-glow);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            scroll-behavior: smooth;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .welcome-screen {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .welcome-screen h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-screen p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .message {
            margin-bottom: 2rem;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            display: flex;
            justify-content: flex-end;
        }

        .user-message .content {
            background: var(--panel-dark);
            padding: 0.75rem 1.25rem;
            border-radius: 1.5rem;
            max-width: 80%;
            border: 1px solid var(--border);
        }

        .bot-message {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .research-panel {
            background: var(--panel-dark);
            border-radius: 1rem;
            border: 1px solid var(--border);
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .research-panel::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .research-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .status-spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(59, 130, 246, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .thought-log {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.2);
            padding: 1.25rem;
            border-radius: 0.75rem;
            max-height: 350px;
            overflow-y: auto;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .thought-entry {
            border-left: 2px solid var(--border);
            padding-left: 1rem;
            transition: all 0.3s ease;
        }

        .thought-entry.info {
            border-left-color: var(--accent);
            color: var(--text-main);
        }

        .thought-entry.success {
            border-left-color: var(--success);
            color: var(--success);
            background: rgba(16, 185, 129, 0.05);
        }

        .thought-entry.warning {
            border-left-color: var(--warning);
            color: var(--warning);
        }

        .thought-entry.error {
            border-left-color: #ef4444;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }

        .insight-pill {
            display: inline-block;
            background: rgba(16, 185, 129, 0.08);
            color: var(--success);
            padding: 0.15rem 0.5rem;
            border-radius: 6px;
            font-size: 0.7rem;
            margin-right: 0.4rem;
            margin-top: 0.3rem;
            border: 1px solid rgba(16, 185, 129, 0.15);
        }

        .report-section {
            background: transparent;
            padding: 1.5rem 0;
            line-height: 1.8;
            font-size: 1rem;
        }

        .report-section h1 {
            font-size: 2rem;
            margin: 2.5rem 0 1.25rem;
            color: #fff;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .report-section h2 {
            font-size: 1.5rem;
            margin: 2rem 0 1rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.6rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .report-section h3 {
            font-size: 1.2rem;
            margin: 1.5rem 0 0.75rem;
            font-weight: 600;
            color: #cbd5e1;
        }

        .report-section p {
            margin-bottom: 1.25rem;
            color: #cbd5e1;
        }

        .report-section ul,
        .report-section ol {
            margin-bottom: 1.75rem;
            padding-left: 1.75rem;
        }

        .report-section li {
            margin-bottom: 0.6rem;
            color: #cbd5e1;
        }

        .report-section table {
            width: 100%;
            border-collapse: collapse;
            margin: 2rem 0;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.02);
        }

        .report-section th,
        .report-section td {
            border: 1px solid var(--border);
            padding: 1rem;
            text-align: left;
        }

        .report-section th {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            font-weight: 600;
        }

        .report-section blockquote {
            border-left: 4px solid var(--accent);
            background: rgba(59, 130, 246, 0.05);
            padding: 1.25rem;
            margin: 1.5rem 0;
            border-radius: 0 8px 8px 0;
            font-style: italic;
            color: #94a3b8;
        }

        .input-container {
            padding: 1.5rem 2rem 3rem;
            background: linear-gradient(to top, var(--bg-dark) 70%, transparent);
            position: relative;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            background: var(--panel-dark);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            padding: 0.6rem 0.6rem 0.6rem 1.5rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow), 0 15px 40px rgba(0, 0, 0, 0.5);
            transform: scale(1.01);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.05rem;
            padding: 0.6rem 0;
            outline: none;
        }

        button#send-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button#send-btn:hover {
            transform: translateY(-2px);
            background: #2563eb;
            box-shadow: 0 6px 16px var(--accent-glow);
        }

        button#send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            header {
                padding: 1rem 1.5rem;
            }

            #chat-container {
                padding: 1rem 1.5rem;
            }

            .welcome-screen h1 {
                font-size: 2.25rem;
            }

            .input-container {
                padding: 1rem 1.5rem 2.5rem;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">SENDA<span> DeepSearch</span>
            <div class="badge">PRO Agent</div>
        </div>
        <div id="status-chip" class="badge hidden">AUTONOMOUS SEARCH ACTIVE</div>
        <div style="font-size: 0.8rem; color: var(--text-muted); font-weight: 500;">By Shreyans Jain</div>
    </header>

    <main>
        <div id="chat-container">
            <div id="welcome" class="welcome-screen">
                <h1>SENDA DeepSearch Agent</h1>
                <p>Proprietary autonomous investigation engine designed by <b>Shreyans Jain</b>. Powered by Llama-3-70B
                    & Live Web Evidence.</p>
                <div class="quick-tips" style="display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center;">
                    <div class="badge"
                        onclick="fastInput('Live analysis of Indian tech sector outlook and AI roadmap 2026')">Tech
                        Roadmap 2026</div>
                    <div class="badge"
                        onclick="fastInput('Deep dive into Sun Pharma specialty pipeline and US generics status')">
                        Pharma Intel</div>
                    <div class="badge"
                        onclick="fastInput('Cross-sector comparative study of US regional banking impact on IT spending')">
                        Macro Banking vs IT</div>
                </div>
            </div>
            <div id="messages-list"></div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="query-input" placeholder="Initiate research mission..." autocomplete="off">
                <button id="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messagesList = document.getElementById('messages-list');
        const welcome = document.getElementById('welcome');
        const queryInput = document.getElementById('query-input');
        const sendBtn = document.getElementById('send-btn');
        const statusChip = document.getElementById('status-chip');

        let currentSse = null;

        function fastInput(text) {
            queryInput.value = text;
            startResearch();
        }

        function createBotMessage() {
            const botMsg = document.createElement('div');
            botMsg.className = 'message bot-message';

            const panel = document.createElement('div');
            panel.className = 'research-panel';
            panel.innerHTML = `
                <div class="research-header">
                    <div class="status-spinner"></div>
                    <div id="status-text" style="font-weight: 600; font-size: 0.95rem;">Planning Mission...</div>
                </div>
                <div class="thought-log" id="thought-log"></div>
            `;

            botMsg.appendChild(panel);

            const reportDiv = document.createElement('div');
            reportDiv.className = 'report-section hidden';
            reportDiv.id = 'final-report';
            botMsg.appendChild(reportDiv);

            messagesList.appendChild(botMsg);
            return { botMsg, panel, thoughtLog: panel.querySelector('#thought-log'), statusText: panel.querySelector('#status-text'), reportDiv };
        }

        function startResearch() {
            const query = queryInput.value.trim();
            if (!query) return;

            welcome.classList.add('hidden');
            queryInput.value = '';
            queryInput.disabled = true;
            sendBtn.disabled = true;
            statusChip.classList.remove('hidden');

            const userMsg = document.createElement('div');
            userMsg.className = 'message user-message';
            userMsg.innerHTML = `<div class="content">${query}</div>`;
            messagesList.appendChild(userMsg);

            const { panel, thoughtLog, statusText, reportDiv } = createBotMessage();
            chatContainer.scrollTo(0, chatContainer.scrollHeight);

            const url = `/api/research/stream?query=${encodeURIComponent(query)}`;
            currentSse = new EventSource(url);

            let totalSteps = 10;
            let currentStepCount = 0;

            currentSse.addEventListener('analysis', (e) => {
                const data = JSON.parse(e.data);
                if (data.sector) {
                    statusText.innerText = `Delegating: ${data.sector} Unit`;
                    addThought(thoughtLog, `Intent: ${data.intent}`, 'active');
                } else {
                    addThought(thoughtLog, data.message, 'active');
                }
            });

            currentSse.addEventListener('plan', (e) => {
                const data = JSON.parse(e.data);
                if (data.areas) {
                    statusText.innerText = "Execution Plan Approved";
                    addThought(thoughtLog, `Strategy: ${data.areas.length} investigation domains identified.`, 'active');
                    totalSteps = data.areas.length + 4;
                } else {
                    addThought(thoughtLog, data.message, 'active', 'info');
                }
            });

            currentSse.addEventListener('thought', (e) => {
                const data = JSON.parse(e.data);
                addThought(thoughtLog, data.message, 'active', data.level);
            });

            currentSse.addEventListener('step_start', (e) => {
                const data = JSON.parse(e.data);
                currentStepCount = data.step;
                statusText.innerText = `Searching: ${data.label}`;
                const entry = addThought(thoughtLog, data.action, 'active');
                entry.id = `step-${data.step}`;
                updateProgress(panel, currentStepCount, totalSteps);
            });

            currentSse.addEventListener('step_done', (e) => {
                const data = JSON.parse(e.data);
                const entry = document.getElementById(`step-${data.step}`);
                if (entry) {
                    entry.classList.remove('active');
                    entry.classList.add('done');
                    let insightsHtml = '<div style="margin-top: 6px;">';
                    data.insights.slice(0, 3).forEach(ins => {
                        insightsHtml += `<span class="insight-pill">${ins.slice(0, 45)}...</span>`;
                    });
                    insightsHtml += '</div>';
                    entry.innerHTML += insightsHtml;
                }
                chatContainer.scrollTo(0, chatContainer.scrollHeight);
            });

            currentSse.addEventListener('financial_start', (e) => {
                statusText.innerText = "Extracting Hard KPIs";
                addThought(thoughtLog, "Running quantitative pattern analysis...", 'active');
            });

            currentSse.addEventListener('report_start', (e) => {
                statusText.innerText = "Synthesizing Narrative";
                addThought(thoughtLog, "Initiating LLM Cross-Synthesis...", 'active');
            });

            currentSse.addEventListener('report', (e) => {
                const data = JSON.parse(e.data);
                statusText.innerText = "Intelligence Ready";
                updateProgress(panel, totalSteps, totalSteps);
                panel.querySelector('.status-spinner').style.display = 'none';
                reportDiv.classList.remove('hidden');
                reportDiv.innerHTML = marked.parse(data.content);
                reportDiv.querySelectorAll('pre code').forEach((block) => hljs.highlightElement(block));
                statusChip.innerText = "COMPLETE";
                setTimeout(() => statusChip.classList.add('hidden'), 3000);
            });

            currentSse.addEventListener('done', cleanup);
            currentSse.onerror = (err) => {
                statusText.innerText = "Mission Interrupted";
                addThought(thoughtLog, "Critical error or connection drop. Restart required.", 'active');
                cleanup();
            };
        }

        function updateProgress(panel, current, total) {
            const progress = (current / total) * 100;
            panel.insertAdjacentHTML('afterbegin', `<style>.research-panel::after { width: ${progress}% !important; }</style>`);
        }

        function addThought(container, text, statusClass, level = 'info') {
            const div = document.createElement('div');
            div.className = `thought-entry ${statusClass} ${level}`;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTo(0, container.scrollHeight);
            return div;
        }

        function cleanup() {
            if (currentSse) { currentSse.close(); currentSse = null; }
            queryInput.disabled = false;
            sendBtn.disabled = false;
            queryInput.focus();
        }

        queryInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') startResearch(); });
        sendBtn.addEventListener('click', startResearch);
        queryInput.focus();
    </script>
</body>

</html>
