<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepResearch | AI Financial Intelligence | SENDA | By: Shreyans Jain</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0b;
            --panel-dark: #161618;
            --sidebar-dark: #0f0f11;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border: #27272a;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 10, 11, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo {
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo span {
            color: var(--accent);
        }

        .app-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* SIDEBAR */
        #sidebar {
            width: 260px;
            background: var(--sidebar-dark);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1rem;
            transition: transform 0.3s ease;
        }

        .new-chat-btn {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--accent-glow);
            color: var(--text-main);
            padding: 0.8rem;
            border-radius: 8px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
            margin-bottom: 1.5rem;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            background: rgba(59, 130, 246, 0.2);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .history-item {
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .history-item.active {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            border-left: 2px solid var(--accent);
        }

        /* MAIN CONTENT */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            scroll-behavior: smooth;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .welcome-screen {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .welcome-screen h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-screen p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .message {
            margin-bottom: 2rem;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            display: flex;
            justify-content: flex-end;
        }

        .user-message .content {
            background: var(--panel-dark);
            padding: 0.75rem 1.25rem;
            border-radius: 1.5rem;
            max-width: 80%;
            border: 1px solid var(--border);
        }

        .bot-message {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .research-panel {
            background: var(--panel-dark);
            border-radius: 1rem;
            border: 1px solid var(--border);
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .research-panel::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .research-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .status-spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(59, 130, 246, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .thought-log {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.2);
            padding: 1.25rem;
            border-radius: 0.75rem;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .thought-entry {
            border-left: 2px solid var(--border);
            padding-left: 1rem;
        }

        .thought-entry.info {
            border-left-color: var(--accent);
            color: var(--text-main);
        }

        .thought-entry.success {
            border-left-color: var(--success);
            color: var(--success);
        }

        .thought-entry.warning {
            border-left-color: var(--warning);
            color: var(--warning);
        }

        .thought-entry.error {
            border-left-color: #ef4444;
            color: #ef4444;
        }

        .insight-pill {
            display: inline-block;
            background: rgba(16, 185, 129, 0.08);
            color: var(--success);
            padding: 0.15rem 0.5rem;
            border-radius: 6px;
            font-size: 0.7rem;
            margin-right: 0.4rem;
            margin-top: 0.3rem;
            border: 1px solid rgba(16, 185, 129, 0.15);
        }

        .report-section {
            background: transparent;
            padding: 1.5rem 0;
            line-height: 1.8;
        }

        .report-section h1 {
            font-size: 1.8rem;
            margin: 2rem 0 1rem;
            color: #fff;
        }

        .report-section table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.9rem;
        }

        .report-section th,
        .report-section td {
            border: 1px solid var(--border);
            padding: 0.75rem;
            text-align: left;
        }

        .report-section th {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
        }

        .input-container {
            padding: 1.5rem 2rem 3rem;
            background: linear-gradient(to top, var(--bg-dark) 70%, transparent);
            position: relative;
        }

        .input-wrapper {
            max-width: 700px;
            margin: 0 auto;
            background: var(--panel-dark);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            padding: 0.5rem 0.5rem 0.5rem 1.25rem;
            transition: all 0.25s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
        }

        button#send-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        button#send-btn:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .badge {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            padding: 0.2rem 0.6rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid var(--accent-glow);
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            #sidebar {
                display: none;
            }

            header {
                padding: 1rem;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">SENDA<span> DeepSearch</span>
            <div class="badge">PRO Agent</div>
        </div>
        <div id="status-chip" class="badge hidden">AUTONOMOUS SEARCH ACTIVE</div>
        <div style="font-size: 0.8rem; color: var(--text-muted); font-weight: 500;">By Shreyans Jain</div>
    </header>

    <div class="app-body">
        <aside id="sidebar">
            <button class="new-chat-btn" onclick="newResearch()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                New Research
            </button>
            <div
                style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; padding-left: 0.5rem;">
                Recent Mission Logs</div>
            <div id="history-list" class="history-list">
                <!-- History items will appear here -->
            </div>
        </aside>

        <main>
            <div id="chat-container">
                <div id="welcome" class="welcome-screen">
                    <h1>SENDA DeepSearch Agent</h1>
                    <p>Proprietary autonomous investigation engine designed by <b>Shreyans Jain</b>. Powered by
                        Llama-3-70B & Live Web Evidence.</p>
                    <div class="quick-tips"
                        style="display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center;">
                        <div class="badge"
                            onclick="fastInput('Live analysis of Indian tech sector outlook and AI roadmap 2026')">Tech
                            Roadmap 2026</div>
                        <div class="badge"
                            onclick="fastInput('Deep dive into Sun Pharma specialty pipeline and US generics status')">
                            Pharma Intel</div>
                        <div class="badge"
                            onclick="fastInput('Cross-sector comparative study of US regional banking impact on IT spending')">
                            Macro Banking vs IT</div>
                    </div>
                </div>
                <div id="messages-list"></div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <input type="text" id="query-input" placeholder="Initiate research mission..." autocomplete="off">
                    <button id="send-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messagesList = document.getElementById('messages-list');
        const welcome = document.getElementById('welcome');
        const queryInput = document.getElementById('query-input');
        const sendBtn = document.getElementById('send-btn');
        const statusChip = document.getElementById('status-chip');
        const historyList = document.getElementById('history-list');

        let currentSse = null;
        let researchHistory = JSON.parse(localStorage.getItem('senda_history') || '[]');

        function init() {
            renderHistory();
        }

        function renderHistory() {
            historyList.innerHTML = '';
            researchHistory.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerText = item.query;
                div.onclick = () => loadHistoryItem(index);
                historyList.appendChild(div);
            });
        }

        function saveToHistory(query, reportContent) {
            researchHistory.unshift({ query, content: reportContent, timestamp: new Date().getTime() });
            researchHistory = researchHistory.slice(0, 20); // Keep last 20
            localStorage.setItem('senda_history', JSON.stringify(researchHistory));
            renderHistory();
        }

        function loadHistoryItem(index) {
            const item = researchHistory[index];
            if (!item) return;

            welcome.classList.add('hidden');
            messagesList.innerHTML = '';

            const userMsg = document.createElement('div');
            userMsg.className = 'message user-message';
            userMsg.innerHTML = `<div class="content">${item.query}</div>`;
            messagesList.appendChild(userMsg);

            const botMsg = document.createElement('div');
            botMsg.className = 'message bot-message';

            const reportWrapper = document.createElement('div');
            reportWrapper.className = 'report-section';
            reportWrapper.innerHTML = `
                <div style="display: flex; justify-content: flex-end; margin-bottom: 2rem;">
                    <button id="download-btn-hist" class="badge" style="cursor: pointer; padding: 0.5rem 1rem; background: var(--success); color: #fff; border:none;">Download as PDF</button>
                </div>
                <div id="hist-report-content">${marked.parse(item.content)}</div>
            `;
            botMsg.appendChild(reportWrapper);
            messagesList.appendChild(botMsg);

            const reportDiv = reportWrapper.querySelector('#hist-report-content');
            reportDiv.querySelectorAll('pre code').forEach((block) => hljs.highlightElement(block));

            reportWrapper.querySelector('#download-btn-hist').onclick = () => {
                html2pdf().from(reportDiv).set({ margin: 1, filename: `SENDA_Report_${item.timestamp}.pdf`, html2canvas: { scale: 2 } }).save();
            };

            chatContainer.scrollTo(0, 0);

            document.querySelectorAll('.history-item').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });
        }

        function newResearch() {
            messagesList.innerHTML = '';
            welcome.classList.remove('hidden');
            document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
            queryInput.focus();
        }

        function fastInput(text) {
            queryInput.value = text;
            startResearch();
        }

        function createBotMessage() {
            const botMsg = document.createElement('div');
            botMsg.className = 'message bot-message';

            const panel = document.createElement('div');
            panel.className = 'research-panel';
            panel.innerHTML = `
                <div class="research-header">
                    <div class="status-spinner"></div>
                    <div id="status-text" style="font-weight: 600; font-size: 0.95rem;">Planning Mission...</div>
                </div>
                <div class="thought-log" id="thought-log"></div>
            `;

            botMsg.appendChild(panel);

            const reportWrapper = document.createElement('div');
            reportWrapper.className = 'report-section hidden';
            reportWrapper.innerHTML = `
                <div style="display: flex; justify-content: flex-end; margin-bottom: 2rem;">
                    <button id="download-btn" class="badge" style="cursor: pointer; padding: 0.5rem 1rem; background: var(--success); color: #fff; border:none;">Download as PDF</button>
                </div>
                <div id="final-report-content"></div>
            `;
            botMsg.appendChild(reportWrapper);

            messagesList.appendChild(botMsg);
            return { botMsg, panel, thoughtLog: panel.querySelector('#thought-log'), statusText: panel.querySelector('#status-text'), reportWrapper, reportDiv: reportWrapper.querySelector('#final-report-content'), downloadBtn: reportWrapper.querySelector('#download-btn') };
        }

        function startResearch() {
            const query = queryInput.value.trim();
            if (!query) return;

            welcome.classList.add('hidden');
            queryInput.value = '';
            queryInput.disabled = true;
            sendBtn.disabled = true;
            statusChip.classList.remove('hidden');

            const userMsg = document.createElement('div');
            userMsg.className = 'message user-message';
            userMsg.innerHTML = `<div class="content">${query}</div>`;
            messagesList.appendChild(userMsg);

            const { panel, thoughtLog, statusText, reportWrapper, reportDiv, downloadBtn } = createBotMessage();
            chatContainer.scrollTo(0, chatContainer.scrollHeight);

            const url = `/api/research/stream?query=${encodeURIComponent(query)}`;
            currentSse = new EventSource(url);

            let totalSteps = 10;
            let currentStepCount = 0;

            currentSse.addEventListener('analysis', (e) => {
                const data = JSON.parse(e.data);
                if (data.sector) {
                    statusText.innerText = `Delegating: ${data.sector} Unit`;
                }
            });

            currentSse.addEventListener('plan', (e) => {
                const data = JSON.parse(e.data);
                if (data.areas) {
                    statusText.innerText = "Plan Approved";
                    totalSteps = data.areas.length + 4;
                }
            });

            currentSse.addEventListener('thought', (e) => {
                const data = JSON.parse(e.data);
                addThought(thoughtLog, data.message, 'active', data.level);
            });

            currentSse.addEventListener('step_start', (e) => {
                const data = JSON.parse(e.data);
                currentStepCount = data.step;
                statusText.innerText = `Searching: ${data.label}`;
                updateProgress(panel, currentStepCount, totalSteps);
            });

            currentSse.addEventListener('report', (e) => {
                const data = JSON.parse(e.data);
                statusText.innerText = "Intelligence Ready";
                updateProgress(panel, totalSteps, totalSteps);
                panel.querySelector('.status-spinner').style.display = 'none';

                reportWrapper.classList.remove('hidden');
                reportDiv.innerHTML = marked.parse(data.content);
                reportDiv.querySelectorAll('pre code').forEach((block) => hljs.highlightElement(block));

                downloadBtn.onclick = () => {
                    html2pdf().from(reportDiv).set({ margin: 1, filename: `SENDA_Report_${new Date().getTime()}.pdf`, html2canvas: { scale: 2 } }).save();
                };

                saveToHistory(query, data.content);

                statusChip.innerText = "COMPLETE";
                setTimeout(() => statusChip.classList.add('hidden'), 3000);
            });

            currentSse.addEventListener('done', cleanup);
            currentSse.onerror = (err) => {
                statusText.innerText = "Error Occurred";
                cleanup();
            };
        }

        function updateProgress(panel, current, total) {
            const progress = (current / total) * 100;
            const styleId = 'progress-style';
            let style = document.getElementById(styleId);
            if (!style) {
                style = document.createElement('style');
                style.id = styleId;
                document.head.appendChild(style);
            }
            style.innerHTML = `.research-panel::after { width: ${progress}% !important; }`;
        }

        function addThought(container, text, statusClass, level = 'info') {
            const div = document.createElement('div');
            div.className = `thought-entry ${statusClass} ${level}`;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTo(0, container.scrollHeight);
            return div;
        }

        function cleanup() {
            if (currentSse) { currentSse.close(); currentSse = null; }
            queryInput.disabled = false;
            sendBtn.disabled = false;
            queryInput.focus();
        }

        queryInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') startResearch(); });
        sendBtn.addEventListener('click', startResearch);
        init();
    </script>
</body>

</html>
